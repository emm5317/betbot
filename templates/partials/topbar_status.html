{{$status := or .OverallStatus .Status "warming"}}
{{$query := or .SelectedSportQuery ""}}
<div id="topbar-status-region"
     class="topbar__meta topbar__meta--live"
     hx-get="{{printf "/partials/topbar-status%s" $query}}"
     hx-trigger="load, every 30s"
     hx-swap="outerHTML">
    <span class="status-pill {{if or (eq $status "ok") (eq $status "success")}}status-pill--ok{{else if eq $status "stale"}}status-pill--stale{{else if eq $status "degraded"}}status-pill--degraded{{else}}status-pill--warn{{end}}">
        {{$status}}
    </span>
    <span class="runtime-chip">{{or .Environment .Env "development"}}</span>
    <span class="runtime-chip runtime-chip--scope">{{or .SelectedSportLabel "All sports"}}</span>
</div>
