<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{if .Title}}{{.Title}} · {{end}}betbot</title>
    <meta name="description" content="betbot operational surface for Phase 1 odds ingestion and pipeline visibility.">
    <link rel="stylesheet" href="/static/css/app.css">
    <script defer src="/static/js/app.js"></script>
</head>
<body>
    <div class="app-shell">
        <div class="chrome">
            <header class="topbar">
                <div class="topbar__brand">
                    <a class="brand-mark" href="/">bb</a>
                    <div>
                        <p class="eyebrow">Phase 1 Operational UI</p>
                        <h1 class="brand-title">betbot</h1>
                    </div>
                </div>

                <nav class="topbar__nav" aria-label="Primary">
                    <a class="nav-link {{if eq .ActiveNav "home"}}is-active{{end}}" href="/">Overview</a>
                    <a class="nav-link {{if eq .ActiveNav "odds"}}is-active{{end}}" href="/odds">Odds</a>
                    <a class="nav-link {{if eq .ActiveNav "pipeline"}}is-active{{end}}" href="/pipeline/health">Pipeline</a>
                </nav>

                <div class="topbar__meta">
                    <span class="status-pill status-pill--{{if eq .OverallStatus "ok"}}good{{else}}warn{{end}}">{{or .OverallStatus "warming"}}</span>
                    <span class="runtime-chip">{{or .Environment "development"}}</span>
                </div>
            </header>

            <main class="workspace">
                {{embed}}
            </main>
        </div>
    </div>
</body>
</html>
